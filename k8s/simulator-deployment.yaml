apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: building-sim
  labels:
    app: simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      containers:
        - name: simulator
          image: building-sim-simulator:local
          imagePullPolicy: IfNotPresent
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: building-sim-config
                  key: API_BASE_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"