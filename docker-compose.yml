services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: building-sim-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile

    container_name: building-sim-simulator

    environment:
      BACKEND_URL: http://backend:8000
      SIM_INTERVAL_SECONDS: 2

    volumes:
      - ./simulator:/app

    depends_on:
      - backend

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: building-sim-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped