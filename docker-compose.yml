services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: building-sim-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: building-sim-simulator
    environment:
      BACKEND_URL: http://backend:8000
      SIM_INTERVAL_SECONDS: 2
    volumes:
      - ./simulator:/app
    depends_on:
      - backend
    restart: unless-stopped