name: Platform QA Pipeline

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Playwright E2E tests"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      run_security_scan:
        description: "Run security scanning"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - local
          - staging
          - production-sim

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: [self-hosted, X64, Linux]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platformdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U platform -d platformdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 backend tests

      - name: Run pytest
        run: |
          pytest tests --junitxml=pytest-report.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-report.xml

  frontend-validation:
    name: Frontend Validation
    runs-on: [self-hosted, X64, Linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker Build and Validation
    runs-on: [self-hosted, X64, Linux]

    needs:
      - backend-validation
      - frontend-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Build Backend
        run: |
          docker build -t platform-backend ./backend

      - name: Docker Build Simulator
        run: |
          docker build -t platform-simulator ./simulator

      - name: Docker Build Frontend
        run: |
          docker build -t platform-frontend ./frontend

      - name: Docker Compose Validation
        run: |
          docker compose config

  integration-tests:
    name: Distributed Integration Tests
    runs-on: [self-hosted, X64, Linux]

    needs:
      - docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean existing containers
        run: |
          docker compose down --remove-orphans || true

      - name: Start full platform
        run: |
          docker compose up -d --build

      - name: Wait for services
        run: |
          sleep 20

      - name: Validate backend health
        run: |
          curl --fail http://localhost:8000/health

      - name: Validate frontend availability
        run: |
          curl --fail http://localhost:5173

      - name: Validate simulator telemetry
        run: |
          curl --fail http://localhost:8000/devices

      - name: Shutdown services
        if: always()
        run: |
          docker compose down --remove-orphans

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: [self-hosted, X64, Linux]

    needs:
      - integration-tests

    if: ${{ github.event.inputs.run_e2e != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Clean existing containers
        run: |
          docker compose down --remove-orphans || true

      - name: Start platform
        run: |
          docker compose up -d --build
          sleep 20

      - name: Execute Playwright tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Shutdown services
        if: always()
        run: |
          docker compose down --remove-orphans

  security-scan:
    name: Security and Dependency Scan
    runs-on: [self-hosted, X64, Linux]

    if: ${{ github.event.inputs.run_security_scan != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python dependency scan
        run: |
          python -m pip install --upgrade pip
          pip install safety
          safety check -r backend/requirements.txt || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Node dependency audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high || true

  k8s-validation:
    name: Kubernetes Manifest Validation
    runs-on: [self-hosted, X64, Linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -k k8s/

  pipeline-summary:
    name: Pipeline Summary
    runs-on: [self-hosted, X64, Linux]

    needs:
      - backend-validation
      - frontend-validation
      - docker-build
      - integration-tests
      - k8s-validation

    if: always()

    steps:
      - name: Pipeline completed
        run: |
          echo "Platform QA pipeline execution complete."
          echo "Backend validation: ${{ needs.backend-validation.result }}"
          echo "Frontend validation: ${{ needs.frontend-validation.result }}"
          echo "Docker build: ${{ needs.docker-build.result }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Kubernetes validation: ${{ needs.k8s-validation.result }}"