name: Platform QA Pipeline

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Playwright E2E tests"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      run_security_scan:
        description: "Run security scanning"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - local
          - staging
          - production-sim

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: [self-hosted, X64, Linux]

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Verify Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install backend dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -r backend/requirements.txt --break-system-packages
          python3 -m pip install flake8 pytest --break-system-packages

      - name: Run linting
        run: |
          python3 -m flake8 backend tests --max-line-length=100 --extend-ignore=W292

      - name: Run pytest
        run: |
          python3 -m pytest tests --junitxml=pytest-report.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-report.xml

  frontend-validation:
    name: Frontend Validation
    runs-on: [self-hosted, X64, Linux]

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Verify Node
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker Build and Validation
    runs-on: [self-hosted, X64, Linux]

    needs:
      - backend-validation
      - frontend-validation

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Docker Build Backend
        run: docker build -t platform-backend ./backend

      - name: Docker Build Simulator
        run: docker build -t platform-simulator ./simulator

      - name: Docker Compose Validation
        run: docker compose config

  integration-tests:
    name: Distributed Integration Tests
    runs-on: [self-hosted, X64, Linux]

    needs:
      - docker-build

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Clean existing containers
        run: docker compose down --remove-orphans || true

      - name: Start full platform
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Validate backend health
        run: curl --fail http://localhost:8000/health

      - name: Validate frontend availability
        run: curl --fail http://localhost:5173

      - name: Validate simulator telemetry
        run: curl --fail http://localhost:8000/devices

      - name: Shutdown services
        if: always()
        run: docker compose down --remove-orphans

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: [self-hosted, X64, Linux]

    needs: integration-tests

    if: ${{ github.event.inputs.run_e2e != 'false' }}

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Clean existing containers
        run: docker compose down --remove-orphans || true

      - name: Start platform
        run: |
          docker compose up -d --build
          sleep 20

      - name: Execute Playwright tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Shutdown services
        if: always()
        run: docker compose down --remove-orphans

  security-scan:
    name: Security and Dependency Scan
    runs-on: [self-hosted, X64, Linux]

    if: ${{ github.event.inputs.run_security_scan != 'false' }}

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Python dependency scan
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install safety --break-system-packages
          safety check -r backend/requirements.txt || true

      - name: Node dependency audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high || true

  k8s-validation:
    name: Kubernetes Manifest Validation
    runs-on: [self-hosted, X64, Linux]

    steps:
      - name: Clean runner workspace permissions
        run: |
          sudo chown -R "$USER":"$USER" ~/actions-runner/_work || true
          sudo chmod -R u+rwX ~/actions-runner/_work || true

      - uses: actions/checkout@v4

      - name: Verify kubectl
        run: kubectl version --client

      - name: Render Kubernetes manifests with Kustomize
        run: kubectl kustomize k8s/

      - name: Validate Kubernetes manifests without cluster OpenAPI
        run: kubectl apply --dry-run=client --validate=false -k k8s/

  pipeline-summary:
    name: Pipeline Summary
    runs-on: [self-hosted, X64, Linux]

    needs:
      - backend-validation
      - frontend-validation
      - docker-build
      - integration-tests
      - k8s-validation

    if: always()

    steps:
      - name: Pipeline completed
        run: |
          echo "Platform QA pipeline execution complete."
          echo "Backend validation: ${{ needs.backend-validation.result }}"
          echo "Frontend validation: ${{ needs.frontend-validation.result }}"
          echo "Docker build: ${{ needs.docker-build.result }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Kubernetes validation: ${{ needs.k8s-validation.result }}"