name: Platform QA Pipeline

on:
  push:
    branches:
      - develop
      - main
      - feature/**
  pull_request:
    branches:
      - develop
      - main

  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Playwright E2E tests"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      run_security_scan:
        description: "Run security scanning"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - local
          - staging
          - production-sim

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  backend-validation:
    name: Backend Validation
    runs-on: [self-hosted, windows, docker]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platformdb
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 backend

      - name: Run pytest
        run: |
          pytest tests --junitxml=pytest-report.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-report.xml

  frontend-validation:
    name: Frontend Validation
    runs-on: [self-hosted, windows]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker Build and Validation
    runs-on: [self-hosted, windows, docker]

    needs:
      - backend-validation
      - frontend-validation

    steps:
      - uses: actions/checkout@v4

      - name: Docker Build Backend
        run: |
          docker build -t platform-backend ./backend

      - name: Docker Build Frontend
        run: |
          docker build -t platform-frontend ./frontend

      - name: Docker Compose Validation
        run: |
          docker compose config

  integration-tests:
    name: Distributed Integration Tests
    runs-on: [self-hosted, windows, docker]

    needs:
      - docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Start full platform
        run: |
          docker compose up -d

      - name: Wait for services
        run: |
          timeout /t 20

      - name: Validate backend health
        run: |
          curl http://localhost:8000/health

      - name: Validate frontend availability
        run: |
          curl http://localhost:5173

      - name: Validate simulator telemetry
        run: |
          curl http://localhost:8000/devices

      - name: Shutdown services
        if: always()
        run: |
          docker compose down

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: [self-hosted, windows]

    needs:
      - integration-tests

    if: github.event.inputs.run_e2e != 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          cd frontend
          npm install
          npx playwright install

      - name: Execute Playwright tests
        run: |
          npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  security-scan:
    name: Security and Dependency Scan
    runs-on: [self-hosted, windows]

    if: github.event.inputs.run_security_scan != 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Python dependency scan
        run: |
          pip install safety
          safety check || exit 0

      - name: Node dependency audit
        run: |
          cd frontend
          npm audit --audit-level=high || exit 0

  k8s-validation:
    name: Kubernetes Manifest Validation
    runs-on: [self-hosted, windows]

    steps:
      - uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -f k8s/

  pipeline-summary:
    name: Pipeline Summary
    runs-on: [self-hosted, windows]

    needs:
      - backend-validation
      - frontend-validation
      - docker-build
      - integration-tests

    if: always()

    steps:
      - name: Pipeline completed
        run: |
          echo "Platform QA pipeline execution complete."
